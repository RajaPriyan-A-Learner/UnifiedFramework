name: Unified Framework CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build & Restore
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - run: dotnet restore
      - run: dotnet build --no-restore --configuration Release

  test-suite:
    needs: build
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        category: [API, UI, Accessibility]
        browser: [Chrome, Edge]
        exclude:
          - category: API
            browser: Edge
    steps:
      - uses: actions/checkout@v4
      - name: Execute Tests
        run: >
          dotnet test --configuration Release 
          --filter "Category=${{ matrix.category }}" 
          --test-param Browser=${{ matrix.browser }}
          --logger "allure"
      
      - name: Upload Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-${{ matrix.category }}-${{ matrix.browser }}
          path: '**/allure-results'

  mobile-tests:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Appium
        env:
          BROWSERSTACK_USERNAME: ${{ secrets.BROWSERSTACK_USERNAME }}
          BROWSERSTACK_ACCESS_KEY: ${{ secrets.BROWSERSTACK_ACCESS_KEY }}
        run: dotnet test --filter "Category=Mobile" --test-param Platform=Android --logger "allure"
      
      - name: Upload Mobile Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-mobile
          path: '**/allure-results'

  report-generation:
    name: Allure Reporting
    needs: [test-suite, mobile-tests] # Wait for all tests to finish
    runs-on: ubuntu-latest
    if: always()
    steps:
      - uses: actions/checkout@v4

      - name: Download All Results
        uses: actions/download-artifact@v4
        with:
          path: all-results
          merge-multiple: true # Combines all uploaded results into one folder

      - name: Get Allure history
        uses: actions/checkout@v4
        continue-on-error: true
        with:
          ref: gh-pages
          path: gh-pages

      - name: Generate Allure Report
        uses: simple-elf/allure-report-action@v1.7
        with:
          allure_results: all-results
          gh_pages: gh-pages
          allure_report: allure-report
          allure_history: allure-history

      - name: Deploy report to Github Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: allure-history